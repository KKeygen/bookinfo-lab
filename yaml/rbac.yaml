apiVersion: v1
kind: ServiceAccount
metadata:
  namespace: default
  name: account-default-manager-auiln
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: chaos-mesh-manager-auiln
rules:
  - apiGroups: ["chaos-mesh.org"]
    resources: ["*"]
    verbs: ["get", "list", "watch", "create", "delete", "patch", "update"]
  - apiGroups: [""]
    resources: ["pods", "namespaces"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: chaos-mesh-manager-binding-auiln
subjects:
  - kind: ServiceAccount
    name: account-default-manager-auiln
    namespace: default
roleRef:
  kind: ClusterRole
  name: chaos-mesh-manager-auiln
  apiGroup: rbac.authorization.k8s.io
